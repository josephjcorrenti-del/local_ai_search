name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/local_ai_search/web/package-lock.json

      - run: python -m pip install -e .
      - run: python -m pip install pytest

      - name: Build frontend
        working-directory: src/local_ai_search/web
        run: |
          npm ci
          npm run build

      - run: bash scripts/tests/run_all.sh
