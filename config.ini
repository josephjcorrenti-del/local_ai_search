[search]
app_name = local_search

# Supported integration providers:
# - local_search
# - duckduckgo
provider = local_search

web_provider = searxng

provider_url = http://localhost:8080
default_limit = 10
timeout_seconds = 20
chunk_size = 1200
chunk_overlap = 200

[ai]
ollama_base_url = http://127.0.0.1:11434
request_timeout_seconds = 120

small_model = phi3:mini
lightweight_model = phi3:mini
large_model = qwen2.5-coder:3b

chat_model = large_model
summary_model = lightweight_model

[integration]
default_mode = integrated
evidence_limit = 5
evidence_max_chars = 4000

default_session_name = default
memory_turn_limit = 8

summary_keep_recent_messages = 8
summary_max_input_messages = 12
summary_inactive_minutes = 30
summary_max_input_chars = 600

web_chat_max_source_chars = 6000

[filesystem]
enabled = true
max_files = 100
max_chars_per_file = 4000

supported_extensions = .md,.txt,.py,.toml,.json,.yaml,.yml
ignored_directories = .git,.venv,__pycache__,node_modules,dist,build
ignored_filenames = .DS_Store
ignored_extensions = .pyc,.so,.dll,.exe,.png,.jpg,.jpeg,.gif,.webp,.svg,.pdf,.zip,.tar,.gz